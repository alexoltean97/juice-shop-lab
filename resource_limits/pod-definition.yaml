apiVersion: v1
kind: Namespace
metadata:
  name: simple-webapp-color
  labels:
    name: simple-webapp-color
spec:
  containers:
    - name: simple-webapp-color
      image: simple-webapp-color
      ports:
        - containerPort: 8080

      resources:
        limits:
          memory: "2Gi"
          cpu: 2
        requests:
          memory: "1Gi"
          cpu: 2  