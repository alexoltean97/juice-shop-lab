apiVersion: v1
kind: Config

clusters:
- name: my-kube-playground
  cluster:
    certificate-authority:
    server: https://my-kube-playground-api-server:6443

contexts:
- name: my-kube-playground
  context:
    cluster: my-kube-playground
    user: admin

users:
- name: admin
  user:
    client-certificate: /path/to/admin.crt
    client-key: /path/to/admin.key  